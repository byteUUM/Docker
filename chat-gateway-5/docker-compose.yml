services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
        - "9001:9001"
    environment:
      SERVER_PORT: "9001"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
          
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    networks:
      - backend-net
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  backend-net:
    driver: bridge
