services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    env_file:
      - gateway.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend-net

  mysql:
    image: mysql:8.0.39
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: chat_gateway
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql:rw
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD","mysqlanmin","ping","-h","localhost","-uroot","-p123456"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend-net

volumes:
  mysql-data:

networks:
  backend-net:
    driver: bridge
