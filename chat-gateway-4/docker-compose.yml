services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    environment:
      SERVER_PORT: "9001"
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - backend-net
  
  redis:
    image: redis:latest
    networks:
      - backend-net

networks:
    backend-net:
      driver: bridge
